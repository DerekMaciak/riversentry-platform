<!DOCTYPE html>
<html lang="en" style="background: linear-gradient(rgba(13, 17, 23, 0.75), rgba(13, 17, 23, 0.80)), url('/_content/RiverSentry.UI.Shared/images/lighteningbackground.png') center/cover no-repeat fixed #0d1117;">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>River Sentry</title>
    <base href="/" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/open-iconic/1.1.1/font/css/open-iconic-bootstrap.min.css" />
    <link rel="stylesheet" href="_content/RiverSentry.UI.Shared/css/riversentry-shared.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="RiverSentry.Mobile.styles.css" />
    <link rel="icon" href="images/logo.png">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="loading-container">
            <div class="spinner-large"></div>
            <p>Loading...</p>
        </div>
    </div>
    <style>
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
        }
        .loading-container p {
            color: #8b949e;
            font-size: 0.95rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin: 0;
        }
        .spinner-large {
            width: 48px;
            height: 48px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="js/pull-to-refresh.js"></script>

</body>

</html>
