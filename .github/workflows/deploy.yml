name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build API
        run: dotnet build src/RiverSentry.Api/RiverSentry.Api.csproj --configuration Release

      - name: Build Web
        run: dotnet build src/RiverSentry.Web/RiverSentry.Web.csproj --configuration Release

      - name: Test
        run: |
          dotnet test tests/RiverSentry.Domain.Tests/RiverSentry.Domain.Tests.csproj --configuration Release
          dotnet test tests/RiverSentry.Application.Tests/RiverSentry.Application.Tests.csproj --configuration Release
          dotnet test tests/RiverSentry.Api.Tests/RiverSentry.Api.Tests.csproj --configuration Release

  deploy-api:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Publish API
        run: dotnet publish src/RiverSentry.Api/RiverSentry.Api.csproj -c Release -o ./publish/api --self-contained -r linux-x64

      - name: Deploy API to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: riversentry-api
          package: ./publish/api

  deploy-web:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Publish Web
        run: dotnet publish src/RiverSentry.Web/RiverSentry.Web.csproj -c Release -o ./publish/web --self-contained -r linux-x64

      - name: Deploy Web to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: riversentry-web
          package: ./publish/web
